<h3 mat-dialog-title class="panel-title">Add "{{ movie.title }}" to…</h3>

@if (collections().length === 0) {
  <p class="panel-empty">No collections yet. Create one first.</p>
} @else {
  <mat-nav-list>
    @for (collection of collections(); track collection.id) {
      <a mat-list-item (click)="addToCollection(collection.id)">
        {{ collection.name }}
        <span matListItemMeta>{{ collection.movies.length }}</span>
      </a>
    }
  </mat-nav-list>
}

<div class="panel-actions">
  <button mat-button (click)="close()">Cancel</button>
</div>
