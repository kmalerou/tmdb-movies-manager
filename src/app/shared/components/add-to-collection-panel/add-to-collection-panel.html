<h3 mat-dialog-title class="panel-title">Add "{{ movie.title }}" to…</h3>

@if (collections().length === 0) {
  <p class="panel-empty">No collections yet. Create one first.</p>
} @else {
  <mat-list>
    @for (collection of collections(); track collection.id) {
      <mat-list-item>
        <span matListItemTitle>{{ collection.name }}</span>
        <button matListItemMeta mat-icon-button
          [disabled]="isInCollection(collection)"
          [attr.aria-label]="isInCollection(collection) ? 'Already in collection' : 'Add to ' + collection.name"
          (click)="addToCollection(collection.id)">
          <mat-icon>{{ isInCollection(collection) ? 'check' : 'playlist_add' }}</mat-icon>
        </button>
      </mat-list-item>
    }
  </mat-list>
}

<div class="panel-actions">
  <button mat-button (click)="close()">Done</button>
</div>
