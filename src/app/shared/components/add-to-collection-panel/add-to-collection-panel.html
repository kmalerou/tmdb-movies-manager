<h3 mat-dialog-title class="panel-title">Add "{{ movie.title }}" to…</h3>

@if (collections().length === 0) {
  <p class="panel-empty">No collections yet. Create one first.</p>
} @else {
  <mat-nav-list>
    @for (collection of collections(); track collection.id) {
      <button mat-list-item [disabled]="isInCollection(collection)" (click)="addToCollection(collection.id)">
        {{ collection.name }}
        <span matListItemMeta>
          @if (isInCollection(collection)) {
            <mat-icon>check</mat-icon>
          } @else {
            {{ collection.movies.length }}
          }
        </span>
      </button>
    }
  </mat-nav-list>
}

<div class="panel-actions">
  <button mat-button (click)="close()">Cancel</button>
</div>
