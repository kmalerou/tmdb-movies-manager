<mat-card class="movie-card">
  @if (posterUrl()) {
    <img class="movie-card__poster" [src]="posterUrl()" [alt]="movie().title" />
  } @else {
    <div class="movie-card__poster movie-card__poster--placeholder">
      <mat-icon>movie</mat-icon>
    </div>
  }

  <mat-card-content class="movie-card__content">
    <p class="movie-card__title">{{ movie().title }}</p>
    <p class="movie-card__meta">⭐ {{ movie().voteAverage | number: '1.1-1' }}</p>
    @if (movie().genres.length) {
      <p class="movie-card__genres">{{ movie().genres.slice(0, 2).join(' · ') }}</p>
    }
  </mat-card-content>

  @if (action()) {
    <mat-card-actions align="end">
      <button
        mat-icon-button
        [color]="action() === 'remove' ? 'warn' : ''"
        (click)="movieAction.emit(movie())"
        [attr.aria-label]="action() === 'add' ? 'Add to collection' : 'Remove from collection'"
      >
        <mat-icon>{{ actionIcon() }}</mat-icon>
      </button>
    </mat-card-actions>
  }
</mat-card>
