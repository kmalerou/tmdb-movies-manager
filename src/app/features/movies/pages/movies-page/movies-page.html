<div class="movies-page">
  <div class="movies-page__search">
    <app-search-bar (queryChange)="onQueryChange($event)" />
    @if (isLoading()) {
      <mat-progress-bar mode="indeterminate" class="movies-page__progress" />
    }
  </div>

  <app-movie-grid [movies]="movies()" action="add" (movieAction)="onMovieAction($event)" />

  <div appInfiniteScroll (scrolled)="onScroll()" class="scroll-sentinel"></div>
</div>

<app-create-collection-fab />
